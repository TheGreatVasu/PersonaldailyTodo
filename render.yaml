# Render Blueprint — API (Node/Express). Set CORS_ORIGINS to your Vercel URL after deploy.
# Dashboard: Health Check Path can be /api/health
services:
  - type: web
    name: rastogi-todo-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CORS_ORIGINS
        sync: false
      - key: DATA_DIR
        sync: false
